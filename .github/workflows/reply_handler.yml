name: SMS Reply Handler

# Polls Gmail for inbound SMS replies every 30 minutes and routes them
# to the correct agent. GitHub Actions minimum schedule is 5 minutes;
# 30 minutes is a reasonable balance between responsiveness and API usage.
on:
  workflow_dispatch: {}      # manual trigger only — auto-reply paused

jobs:
  process-replies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process inbound replies
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:              ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:         ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TOKEN:                ${{ secrets.GMAIL_TOKEN }}
          GOOGLE_SHEET_ID:            ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS:  ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          OWNER_EMAIL:                ${{ secrets.OWNER_EMAIL }}
        run: python reply_handler.py
